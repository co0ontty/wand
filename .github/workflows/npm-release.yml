name: NPM Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version with tag
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '${{ steps.version.outputs.version }}';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # tag push 往往伴随同一时刻的 master push，Beta NPM Publish 会和这里并发写
      # 同一个包的 packument，npm 注册表会对后到的一方报 E409。所以：
      #   1) 幂等：版本已在 npm 上则直接成功（也覆盖手动重跑场景）；
      #   2) 失败后指数退避重试，并在每次重试前再查一遍版本是否实际已落地。
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -uo pipefail
          PKG="@co0ontty/wand"
          VERSION="${{ steps.version.outputs.version }}"
          published() { npm view "${PKG}@${VERSION}" version >/dev/null 2>&1; }
          if published; then
            echo "${PKG}@${VERSION} already on npm; nothing to do."
            exit 0
          fi
          for attempt in 1 2 3 4 5; do
            if npm publish --access public; then
              exit 0
            fi
            if published; then
              echo "npm publish reported an error but ${VERSION} is live; treating as success."
              exit 0
            fi
            delay=$((attempt * 30))
            echo "Publish attempt ${attempt} failed (likely E409 race with beta publish); retrying in ${delay}s..."
            sleep "${delay}"
          done
          echo "All publish attempts failed." >&2
          exit 1
