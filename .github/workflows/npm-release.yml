name: NPM Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-npm:
    concurrency:
      group: npm-publish
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync package versions with tag
        run: |
          node -e "
          const fs = require('fs');
          const version = '${{ steps.version.outputs.version }}';
          for (const file of ['package.json', 'package-lock.json']) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            pkg.version = version;
            if (pkg.packages && pkg.packages['']) pkg.packages[''].version = version;
            fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');
          }
          "

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Stable 与 beta 发布共用 npm-publish concurrency group，避免同时写同一个
      # packument。npm publish 返回成功后仍要反查 registry，因为并发写曾导致版本被
      # tombstone：不能重发同版本，但 npm view 又读不到它。
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -uo pipefail
          PKG="@co0ontty/wand"
          VERSION="${{ steps.version.outputs.version }}"
          published() { [ "$(npm view "${PKG}@${VERSION}" version 2>/dev/null || true)" = "${VERSION}" ]; }
          latest_tagged() { [ "$(npm view "${PKG}" dist-tags.latest 2>/dev/null || true)" = "${VERSION}" ]; }
          wait_for_publish() {
            for check in 1 2 3 4 5 6; do
              if published && latest_tagged; then
                return 0
              fi
              delay=$((check * 10))
              echo "Waiting for ${PKG}@${VERSION} to appear as latest (${check}/6); retrying in ${delay}s..."
              sleep "${delay}"
            done
            return 1
          }
          if published; then
            echo "${PKG}@${VERSION} already on npm; ensuring latest dist-tag."
            npm dist-tag add "${PKG}@${VERSION}" latest
            wait_for_publish
            exit $?
          fi
          for attempt in 1 2 3 4 5; do
            if npm publish --access public && wait_for_publish; then
              exit 0
            fi
            if published; then
              echo "${PKG}@${VERSION} exists after publish attempt; ensuring latest dist-tag."
              npm dist-tag add "${PKG}@${VERSION}" latest
              if wait_for_publish; then
                exit 0
              fi
            fi
            delay=$((attempt * 30))
            echo "Publish attempt ${attempt} failed or did not propagate; retrying in ${delay}s..."
            sleep "${delay}"
          done
          echo "All publish attempts failed." >&2
          exit 1
