name: macOS DMG Release

# 两种触发（对称 ios-build.yml）：
#   1) push tag v*：正式发版，DMG 上传到对应 GitHub Release（不动 release body）。
#   2) 手动 workflow_dispatch：日常出包/验证用，产物作为 Actions artifact 下载，不发 release。
on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 1.16.0），仅用于文件名与版本字段"
        required: false
        default: "0.0.0-dev"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    # 钉 macos-26：默认 Xcode 26.x（macOS 26 SDK）。同 ios-build.yml——
    # Liquid Glass 只对用 26 SDK 链接的 App 生效，macos-latest 迁移完成前还是 Xcode 16.4。
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # macos/ 是 submodule：tag 触发时若自上一个 tag 以来指针没动过就跳过构建（同 android-release.yml）。
      # 手动 workflow_dispatch 永远构建——手动触发就是明确要出包。
      - name: Detect macos changes since previous tag
        id: changed
        run: |
          if [ "${GITHUB_REF}" = "${GITHUB_REF#refs/tags/}" ]; then
            echo "手动触发，跳过变更检测，直接构建"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -Fx -A1 "$TAG" | tail -n +2 | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "没有更早的 tag，按首个 release 处理，执行构建"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CUR=$(git rev-parse "$TAG:macos" 2>/dev/null || echo "missing-cur")
          PREV=$(git rev-parse "$PREV_TAG:macos" 2>/dev/null || echo "missing-prev")
          if [ "$CUR" = "$PREV" ]; then
            echo "macos 自 $PREV_TAG 以来无变化（$CUR），跳过 DMG 构建"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "macos 有变化：$PREV_TAG=$PREV → $TAG=$CUR"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode
        if: steps.changed.outputs.changed == 'true'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve version
        if: steps.changed.outputs.changed == 'true'
        id: version
        run: |
          if [ "${GITHUB_REF}" != "${GITHUB_REF#refs/tags/}" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        if: steps.changed.outputs.changed == 'true'
        working-directory: macos
        run: |
          chmod +x build.sh
          chmod +x scripts/generate-icons.swift
          ./build.sh "${{ steps.version.outputs.version }}"

      # 手动触发 / 任何情况下都上传为 artifact，方便直接在 Actions run 页面下载。
      - name: Upload DMG artifact
        if: steps.changed.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wand-macos-dmg-${{ steps.version.outputs.version }}
          path: macos/dist/wand-v${{ steps.version.outputs.version }}.dmg
          if-no-files-found: error

      # 仅 tag push 时传到 Release（body 由 release-notes.yml 单点管理，这里只放文件）。
      - name: Upload DMG to GitHub Release
        if: steps.changed.outputs.changed == 'true' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: macos/dist/wand-v${{ steps.version.outputs.version }}.dmg
