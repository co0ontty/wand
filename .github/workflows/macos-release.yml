name: macOS DMG Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        working-directory: macos
        run: |
          chmod +x build.sh
          chmod +x scripts/generate-icons.swift
          ./build.sh "${{ steps.version.outputs.version }}"

      # body 由 .github/workflows/release-notes.yml 单点管理，这里只上传 DMG。
      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: macos/dist/wand-v${{ steps.version.outputs.version }}.dmg
