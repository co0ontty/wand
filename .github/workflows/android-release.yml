name: Android APK Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 主仓库 tag 与客户端子模块 push 几乎同时发生时，checkout@v4 的
          # 一次性递归拉取会直接失败。先取主仓库，再对目标子模块做有退避的重试。
          submodules: false
          fetch-depth: 0

      - name: Checkout Android submodule
        run: |
          set -euo pipefail
          git submodule sync -- android
          for attempt in 1 2 3 4 5; do
            if git submodule update --init --force -- android; then
              exit 0
            fi
            delay=$((attempt * 15))
            echo "android submodule checkout failed; retrying in ${delay}s..."
            sleep "$delay"
          done
          git submodule status -- android
          exit 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          BUILD_STAMP="$(TZ=Asia/Shanghai date +%Y%m%d%H%M)"
          if [[ "$VERSION" == *+* ]]; then
            ASSET_VERSION="${VERSION}.${BUILD_STAMP}"
          else
            ASSET_VERSION="${VERSION}+${BUILD_STAMP}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_stamp=$BUILD_STAMP" >> "$GITHUB_OUTPUT"
          echo "asset_version=$ASSET_VERSION" >> "$GITHUB_OUTPUT"

      # versionCode 一律由 android/app/build.gradle 从 versionName 派生（唯一真源）。
      # 不要在这里另算一套传 -PAPP_VERSION_CODE：两套方案并存会让本地构建装过的设备
      # 升级 CI 包时被系统按「降级」拒装（INSTALL_FAILED_VERSION_DOWNGRADE）。
      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            -PAPP_VERSION_NAME=${{ steps.version.outputs.version }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/wand-v${{ steps.version.outputs.asset_version }}.apk

      # body 由 .github/workflows/release-notes.yml 单点管理，这里只上传 APK。
      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/wand-v${{ steps.version.outputs.asset_version }}.apk
