name: Android APK Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # versionCode 一律由 android/app/build.gradle 从 versionName 派生（唯一真源）。
      # 不要在这里另算一套传 -PAPP_VERSION_CODE：两套方案并存会让本地构建装过的设备
      # 升级 CI 包时被系统按「降级」拒装（INSTALL_FAILED_VERSION_DOWNGRADE）。
      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            -PAPP_VERSION_NAME=${{ steps.version.outputs.version }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/wand-${{ steps.version.outputs.tag }}.apk

      # body 由 .github/workflows/release-notes.yml 单点管理，这里只上传 APK。
      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/wand-${{ steps.version.outputs.tag }}.apk
