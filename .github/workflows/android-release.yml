name: Android APK Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # android/ 是 submodule：如果自上一个 tag 以来指针没动过（客户端代码没更新），
      # 跳过本次构建——不重复出包，老版本继续作为最新可用 APK（服务端会向前遍历 release 找包）。
      - name: Detect android changes since previous tag
        id: changed
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -Fx -A1 "$TAG" | tail -n +2 | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "没有更早的 tag，按首个 release 处理，执行构建"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CUR=$(git rev-parse "$TAG:android" 2>/dev/null || echo "missing-cur")
          PREV=$(git rev-parse "$PREV_TAG:android" 2>/dev/null || echo "missing-prev")
          if [ "$CUR" = "$PREV" ]; then
            echo "android 自 $PREV_TAG 以来无变化（$CUR），跳过 APK 构建"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "android 有变化：$PREV_TAG=$PREV → $TAG=$CUR"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.changed.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        if: steps.changed.outputs.changed == 'true'
        uses: android-actions/setup-android@v3

      - name: Extract version from tag
        if: steps.changed.outputs.changed == 'true'
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Generate numeric version code from version string (e.g. 1.10.0 -> 11000)
          IFS='.' read -r major minor patch <<< "$VERSION"
          VERSION_CODE=$(( major * 10000 + minor * 100 + ${patch:-0} ))
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Build APK
        if: steps.changed.outputs.changed == 'true'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            -PAPP_VERSION_NAME=${{ steps.version.outputs.version }} \
            -PAPP_VERSION_CODE=${{ steps.version.outputs.version_code }}

      - name: Rename APK
        if: steps.changed.outputs.changed == 'true'
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/wand-${{ steps.version.outputs.tag }}.apk

      # body 由 .github/workflows/release-notes.yml 单点管理，这里只上传 APK。
      - name: Upload APK to GitHub Release
        if: steps.changed.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/wand-${{ steps.version.outputs.tag }}.apk
