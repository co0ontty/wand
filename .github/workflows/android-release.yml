name: Android APK Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Generate numeric version code from version string (e.g. 1.10.0 -> 11000)
          IFS='.' read -r major minor patch <<< "$VERSION"
          VERSION_CODE=$(( major * 10000 + minor * 100 + ${patch:-0} ))
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            -PAPP_VERSION_NAME=${{ steps.version.outputs.version }} \
            -PAPP_VERSION_CODE=${{ steps.version.outputs.version_code }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/wand-${{ steps.version.outputs.tag }}.apk

      # body 由 .github/workflows/release-notes.yml 单点管理，这里只上传 APK。
      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/wand-${{ steps.version.outputs.tag }}.apk
