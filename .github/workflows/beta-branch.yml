name: Beta NPM Publish

# 每次 push 到 master，基于最新正式 tag 发布一个 npm beta 版本。
# 版本形态：<tag-version>-beta.g<short-sha>，例如 1.43.2-beta.ga1b2c3d。
# 正式版与 Beta 版都走同一条 npm 全局安装链路；区别仅是 dist-tag：
#   stable → npm @latest（纯 tag）
#   beta   → npm @beta（tag + commit 尾标）

on:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: beta-branch
  cancel-in-progress: true

jobs:
  publish-beta:
    concurrency:
      group: npm-publish
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Compute beta version
        id: version
        run: |
          set -euo pipefail
          TAG="$(git tag --sort=-v:refname --list 'v*' | head -1)"
          if [ -z "$TAG" ]; then
            echo "No v* tag found" >&2
            exit 1
          fi
          BASE_VERSION="${TAG#v}"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          VERSION="${BASE_VERSION}-beta.g${SHORT_SHA}"
          echo "base_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync package versions
        run: |
          node -e "
          const fs = require('fs');
          const version = '${{ steps.version.outputs.version }}';
          for (const file of ['package.json', 'package-lock.json']) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            pkg.version = version;
            if (pkg.packages && pkg.packages['']) pkg.packages[''].version = version;
            fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');
          }
          "

      - name: Install dependencies
        run: npm ci

      - name: Build (stamp beta channel)
        run: npm run build
        env:
          # 让 scripts/stamp-build-info.js 写 channel=beta、commit=master HEAD。
          WAND_BUILD_CHANNEL: beta

      - name: Publish beta to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          WAND_PUBLISH_VERSION: ${{ steps.version.outputs.version }}
          WAND_BUILD_CHANNEL: beta
        run: |
          set -uo pipefail
          PKG="@co0ontty/wand"
          VERSION="${{ steps.version.outputs.version }}"
          published() { [ "$(npm view "${PKG}@${VERSION}" version 2>/dev/null || true)" = "${VERSION}" ]; }
          beta_tagged() { [ "$(npm view "${PKG}" dist-tags.beta 2>/dev/null || true)" = "${VERSION}" ]; }
          wait_for_publish() {
            for check in 1 2 3 4 5 6; do
              if published && beta_tagged; then
                return 0
              fi
              delay=$((check * 10))
              echo "Waiting for ${PKG}@${VERSION} to appear as beta (${check}/6); retrying in ${delay}s..."
              sleep "${delay}"
            done
            return 1
          }
          if published; then
            echo "Version ${VERSION} already exists on npm; moving beta dist-tag."
            npm dist-tag add "${PKG}@${VERSION}" beta
            wait_for_publish
            exit $?
          fi
          for attempt in 1 2 3 4 5; do
            if npm publish --access public --tag beta && wait_for_publish; then
              exit 0
            fi
            if published; then
              echo "${PKG}@${VERSION} exists after publish attempt; ensuring beta dist-tag."
              npm dist-tag add "${PKG}@${VERSION}" beta
              if wait_for_publish; then
                exit 0
              fi
            fi
            delay=$((attempt * 30))
            echo "Publish attempt ${attempt} failed or did not propagate; retrying in ${delay}s..."
            sleep "${delay}"
          done
          echo "All publish attempts failed." >&2
          exit 1
