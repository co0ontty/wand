name: Beta NPM Publish

# 每次 push 到 master，基于最新正式 tag 发布一个 npm beta 版本。
# 版本形态：<tag-version>-beta.g<short-sha>，例如 1.43.2-beta.ga1b2c3d。
# 正式版与 Beta 版都走同一条 npm 全局安装链路；区别仅是 dist-tag：
#   stable → npm @latest（纯 tag）
#   beta   → npm @beta（tag + commit 尾标）

on:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: beta-branch
  cancel-in-progress: true

jobs:
  publish-beta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Compute beta version
        id: version
        run: |
          set -euo pipefail
          TAG="$(git tag --sort=-v:refname --list 'v*' | head -1)"
          if [ -z "$TAG" ]; then
            echo "No v* tag found" >&2
            exit 1
          fi
          BASE_VERSION="${TAG#v}"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          VERSION="${BASE_VERSION}-beta.g${SHORT_SHA}"
          echo "base_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync package versions
        run: |
          node -e "
          const fs = require('fs');
          const version = '${{ steps.version.outputs.version }}';
          for (const file of ['package.json', 'package-lock.json']) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            pkg.version = version;
            if (pkg.packages && pkg.packages['']) pkg.packages[''].version = version;
            fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');
          }
          "

      - name: Install dependencies
        run: npm ci

      - name: Build (stamp beta channel)
        run: npm run build
        env:
          # 让 scripts/stamp-build-info.js 写 channel=beta、commit=master HEAD。
          WAND_BUILD_CHANNEL: beta

      - name: Publish beta to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          WAND_PUBLISH_VERSION: ${{ steps.version.outputs.version }}
          WAND_BUILD_CHANNEL: beta
        run: |
          set -euo pipefail
          if npm view "@co0ontty/wand@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "Version ${{ steps.version.outputs.version }} already exists on npm; moving beta dist-tag."
            npm dist-tag add "@co0ontty/wand@${{ steps.version.outputs.version }}" beta
          else
            npm publish --access public --tag beta
          fi
