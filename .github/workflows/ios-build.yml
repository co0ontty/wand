name: iOS IPA Build

# 云端编译未签名 IPA（不需要本地 Mac）。两种触发：
#   1) 手动 workflow_dispatch：日常出包用这个，产物作为 Actions artifact 下载，
#      不打 tag、不发 release，不会触发 npm/android/macos 的正式发布。
#   2) push tag v*：对称其它平台，把 IPA 一并上传到对应 GitHub Release（不动 release body）。
on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 1.16.0），仅用于文件名与版本字段"
        required: false
        default: "0.0.0-dev"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-ios:
    # 钉 macos-26：默认 Xcode 26.x（iOS 26 SDK）。Liquid Glass 等 iOS 26 系统外观
    # 只对「用 iOS 26 SDK 链接」的 App 生效——macos-latest 在 2026-06 迁移期前
    # 仍是 macOS 15 + Xcode 16.4（iOS 18 SDK），编出来的包会被系统按旧外观渲染。
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # ios/ 是 submodule：tag 触发时若自上一个 tag 以来指针没动过就跳过构建（同 android/macos）。
      # 手动 workflow_dispatch 永远构建——手动触发就是明确要出包。
      - name: Detect ios changes since previous tag
        id: changed
        run: |
          if [ "${GITHUB_REF}" = "${GITHUB_REF#refs/tags/}" ]; then
            echo "手动触发，跳过变更检测，直接构建"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -Fx -A1 "$TAG" | tail -n +2 | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "没有更早的 tag，按首个 release 处理，执行构建"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CUR=$(git rev-parse "$TAG:ios" 2>/dev/null || echo "missing-cur")
          PREV=$(git rev-parse "$PREV_TAG:ios" 2>/dev/null || echo "missing-prev")
          if [ "$CUR" = "$PREV" ]; then
            echo "ios 自 $PREV_TAG 以来无变化（$CUR），跳过 IPA 构建"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "ios 有变化：$PREV_TAG=$PREV → $TAG=$CUR"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode
        if: steps.changed.outputs.changed == 'true'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve version
        if: steps.changed.outputs.changed == 'true'
        id: version
        run: |
          if [ "${GITHUB_REF}" != "${GITHUB_REF#refs/tags/}" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build unsigned IPA
        if: steps.changed.outputs.changed == 'true'
        working-directory: ios
        run: |
          chmod +x build.sh
          chmod +x scripts/generate-icons.swift
          ./build.sh "${{ steps.version.outputs.version }}"

      # 手动触发 / 任何情况下都上传为 artifact，方便直接在 Actions run 页面下载。
      - name: Upload IPA artifact
        if: steps.changed.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wand-ios-ipa-${{ steps.version.outputs.version }}
          path: ios/dist/wand-v${{ steps.version.outputs.version }}.ipa
          if-no-files-found: error

      # 仅 tag push 时额外传到 Release（body 由 release-notes.yml 单点管理，这里只放文件）。
      - name: Upload IPA to GitHub Release
        if: steps.changed.outputs.changed == 'true' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ios/dist/wand-v${{ steps.version.outputs.version }}.ipa
