name: Cleanup Old Release Assets

# 只保留最近 N 个 release 的 APK / DMG 产物，更老的 release 页面与 release notes 保留，
# 仅删除二进制 assets。每次新 release 发布后自动跑；也可手动触发做一次性清理。
#
# - 排序：按 tag 的 semver 降序（sort -V），不依赖 created_at，避免回填型发布被误删。
# - 保护刚发布的那个 tag：哪怕它的 semver 排不进前 N（例如对老分支的补丁版本），
#   也会被排除在删除名单外。
# - 仅删 .apk / .dmg / .ipa，其他 assets 不动。
# - 每类产物全局至少保住一个：客户端代码连续多版未变时 CI 会跳过构建，
#   某类产物最后一次真实出包可能掉出保留窗口。服务端 GitHub 回退是向前遍历
#   release 找包的，所以当保留窗口内完全没有某类产物时，窗口外最新的那一个不删。

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      keep:
        description: "保留最近多少个 release 的产物（默认 10）"
        required: false
        default: "10"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Prune APK/DMG/IPA from older releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP: ${{ github.event.inputs.keep || '10' }}
          TRIGGER_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          echo "Repo:       $REPO"
          echo "Keep:       $KEEP most recent (by semver)"
          echo "Trigger:    ${TRIGGER_TAG:-<manual>}"

          # 拉所有非 draft release 的 tag，只保留形如 v<num>.<num>.<num> 开头的，
          # 然后按 semver 降序排序。
          mapfile -t TAGS < <(
            gh release list --repo "$REPO" --limit 1000 \
              --json tagName,isDraft \
              --jq '.[] | select(.isDraft | not) | .tagName' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' \
              | sort -Vr
          )

          echo "Total releases scanned: ${#TAGS[@]}"

          if [ "${#TAGS[@]}" -le "$KEEP" ]; then
            echo "Nothing to prune (${#TAGS[@]} <= $KEEP)."
            exit 0
          fi

          # 取保留窗口之外的 tag
          PRUNE=("${TAGS[@]:$KEEP}")
          echo "Candidates to prune: ${#PRUNE[@]}"

          asset_ext() {
            case "${1,,}" in
              *.apk) echo apk ;;
              *.dmg) echo dmg ;;
              *.ipa) echo ipa ;;
            esac
          }

          # 统计保留窗口内每类产物是否存在
          declare -A EXT_IN_KEEP=()
          for tag in "${TAGS[@]:0:$KEEP}"; do
            while IFS= read -r name; do
              ext=$(asset_ext "$name")
              [ -n "$ext" ] && EXT_IN_KEEP["$ext"]=1
            done < <(
              gh release view "$tag" --repo "$REPO" --json assets \
                --jq '.assets[].name' 2>/dev/null || true
            )
          done

          # 缓存窗口外每个 release 的产物清单（也避免重复调 API）
          declare -A PRUNE_ASSETS=()
          for tag in "${PRUNE[@]}"; do
            PRUNE_ASSETS["$tag"]=$(
              gh release view "$tag" --repo "$REPO" --json assets \
                --jq '.assets[] | select(.name | test("\\.(apk|dmg|ipa)$"; "i")) | .name' \
                2>/dev/null || true
            )
          done

          # 保留窗口内缺失的产物类型：保住窗口外（semver 降序）最新的那一个
          declare -A PROTECT=()
          for want in apk dmg ipa; do
            [ -n "${EXT_IN_KEEP[$want]:-}" ] && continue
            for tag in "${PRUNE[@]}"; do
              found=""
              while IFS= read -r name; do
                [ -z "$name" ] && continue
                if [ "$(asset_ext "$name")" = "$want" ]; then
                  found=1
                  break
                fi
              done <<< "${PRUNE_ASSETS[$tag]}"
              if [ -n "$found" ]; then
                PROTECT["$tag $want"]=1
                echo "Protect last remaining .$want outside keep window: $tag"
                break
              fi
            done
          done

          deleted=0
          skipped=0

          for tag in "${PRUNE[@]}"; do
            # 保护当前触发本次 workflow 的那个 release —— 即使它 semver 排不进前 N
            # （例如对老 minor 的补丁版本），也不允许删它自己刚上传的产物。
            if [ -n "$TRIGGER_TAG" ] && [ "$tag" = "$TRIGGER_TAG" ]; then
              echo "Skip $tag (current trigger release)"
              skipped=$((skipped + 1))
              continue
            fi

            while IFS= read -r asset; do
              [ -z "$asset" ] && continue
              ext=$(asset_ext "$asset")
              if [ -n "$ext" ] && [ -n "${PROTECT["$tag $ext"]:-}" ]; then
                echo "Skip $tag / $asset (last remaining .$ext)"
                skipped=$((skipped + 1))
                continue
              fi
              echo "Deleting: $tag / $asset"
              if gh release delete-asset "$tag" "$asset" --repo "$REPO" --yes; then
                deleted=$((deleted + 1))
              else
                echo "  -> failed, continuing"
              fi
            done <<< "${PRUNE_ASSETS[$tag]}"
          done

          echo "----"
          echo "Assets deleted: $deleted"
          echo "Releases skipped (trigger/protected): $skipped"
