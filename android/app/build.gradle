plugins {
    id 'com.android.application'
}

def appVersionName = project.hasProperty('APP_VERSION_NAME') ? project.property('APP_VERSION_NAME') : "1.0.0"

// major * 1_000_000 + minor * 10_000 + patch * 100 + (debug ? 1 : 0)
// e.g. 1.17.6 → 1_170_600 (release), 1.17.6-debug.xxx → 1_170_601
def computeVersionCode = { String name ->
    def m = (name =~ /(\d+)\.(\d+)\.(\d+)/)
    if (m.find()) {
        def base = m.group(1).toInteger() * 1000000 + m.group(2).toInteger() * 10000 + m.group(3).toInteger() * 100
        return base + (name.contains("-debug") ? 1 : 0)
    }
    return 1
}

def appVersionCode = project.hasProperty('APP_VERSION_CODE') ? project.property('APP_VERSION_CODE').toString().toInteger() : computeVersionCode(appVersionName)

android {
    namespace 'com.wand.app'
    compileSdk 36

    defaultConfig {
        applicationId "com.wand.app"
        minSdk 24
        targetSdk 36
        versionCode appVersionCode
        versionName appVersionName
    }

    // Stable signing config — committed to the repo so APKs built locally,
    // by publish.sh, and by GitHub Actions all share the same signature.
    // Without this, every machine generates its own debug keystore and users
    // hit "package signatures do not match" when updating across sources.
    // This is a self-signed distribution key, NOT a Play Store upload key.
    signingConfigs {
        wand {
            storeFile rootProject.file('wand-release.keystore')
            storePassword 'wand-release'
            keyAlias 'wand'
            keyPassword 'wand-release'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.wand
        }
        release {
            signingConfig signingConfigs.wand
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.webkit:webkit:1.9.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'androidx.core:core:1.18.0'
    // QR scanner — wraps ZXing for camera-based decoding
    implementation 'com.journeyapps:zxing-android-embedded:4.3.0'
}
